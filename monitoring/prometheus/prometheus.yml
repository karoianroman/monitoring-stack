global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: "production"
    project: "monitoring-demo"

scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI app
  - job_name: "fastapi-app"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["app:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "fastapi-app"

  # Node Exporter (host VM metrics)
  - job_name: "node-exporter"
    scrape_interval: 30s
    static_configs:
      - targets: ["node-exporter:9100"]
